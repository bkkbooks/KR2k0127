body:
  text: 益部談資地理類八雜記之屬提要臣等謹案益部談資三卷明夔州通判何宇度撰所紀皆四川山川物産及古今軼事分上中下三卷以體例不似圖經故署曰談資蓋自居于説部也輿地之籍原所以記州郡封略道里厄塞土田戶口之數以便考核而先賢風俗等傳前人往往著為成書則博採遺聞亦未嘗不可以資談助蜀中地志以揚雄蜀王本紀譙周三巴記李克益州記為最古其書雖不盡傳而大要亦多雜載事迹取備掌故至自唐以後見於列史藝文志者如杜光庭續成都記趙抃成都古今集記及宋代所修潼川臨邛忠州墊江夔州諸圖志今俱散佚無存則掇拾搜羅正考訂者所不廢是書旁採羣籍雖未能精核無遺然尚不至於蕪蔓其後曹學佺作蜀中名勝記徴托較博而稍涉泛濫不若此本之雅潔在明人著述中猶可稱簡而有要者原本有李維禎跋語亦極推為善本云乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6b147f98e17a3382a00dd6566d49652d7d179ba9c66480c962b1f7ee49ad808b
