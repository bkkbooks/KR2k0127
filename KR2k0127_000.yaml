body:
  text: 益部談資地理類八雜記之屬提要臣等謹案益部談資三卷明䕫州通判何宇度撰所紀皆四川山川物産及古今軼事分上中下三卷以體例不似圖經故署曰談資葢自居于説部也輿地之籍原所以記州郡封畧道里阸塞土田戸口之數以便考核而先賢風俗等傳前人往往著為成書則博採遺聞亦未嘗不可以資談助蜀中地志以揚雄蜀王本紀譙周三巴記李克益州記為最古其書雖不盡傳而大要亦多雜載事蹟取備掌故至自唐以後見於列史藝文志者如杜光庭續成都記趙抃成都古今集記及宋代所修潼川臨邛忠州墊江䕫州諸圖志今俱散佚無存則掇拾蒐羅正考訂者所不廢是書旁採羣籍雖未能精核無遺然尚不至於蕪蔓其後曹學佺作蜀中名勝記徴摭較博而稍渉氾濫不若此本之雅㓗在明人著述中猶可稱簡而有要者原本有李維禎跋語亦極推為善本云乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2d02586f6278ebb8699e879113a239e4c764d593cbea503a38253dd707437b81
