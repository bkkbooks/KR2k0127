  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0127_WYG_003-1a, image: WYG0592/WYG0592-0752c.png}
body:
  text: 益部談資卷下明何宇度撰蜀道難自古記之梁簡文帝詩云巫山七百里巴水千回曲為川東舟行峽中作也李白詩云不與秦塞通雲烟為川北棧道作也大都蜀道無不難如上青天者峽固險矣而陵亦匪夷如夷陵至巴東之陸程則視棧道何異是其難又在楚不在蜀耳過巴東一日始抵蜀界沿江而行險覺稍減巫山十二峯從輿人指㸃微見一二逺插天外楚入蜀縣首為巫山倚山俯江官民髙下而居江口有神女廟荒蕪不治乃有司新移置者舊廟在江干離縣十里聞亦頺廢豫令人搨古碑無有也宋玉髙唐賦想隨襄王之夢逝矣楚宫僅存遺址在巫山西北楚襄王所逰之地也黃山谷楚宫詩刻所謂細腰宫即此今竟覔不可得巫峽即巫山也與西陵峽歸鄉峽並稱三峽連山七百里非亭午夜分不見日月水經云杜宇所鑿以通江水圖經云抗峰岷峨偕嶺衡嶽凝結翼附並出青雲宋盛𢎞之荆州記云三峽中兩岸連山略無缺處重巖疊嶂隱天蔽日杜修可峽程記云三峽謂明月峽巫山峽廣澤峽其瞿塘灔澦之類不係三峽數趙文敏手書十二巫峯詞昔刻於巫山縣令尹厭其來索之煩磨去豫僅於士夫家見之陽臺在巫山頂山不甚高臺正平坻荒烟野草襄王神女不知何在三峽猿聲古人題咏極富豫未舟行不及聞訊之馬元赤云峽中兩岸最多或三五為偶或百數十為羣沿崖援樹不可勝數惟亦未聞啼聲竹枝歌唐劉禹錫白居易皆嘗賦之凄婉悲怨蘇長公云有楚人哀屈弔賈之遺聲焉鶴林玉露載宋時三峽長年猶能歌之今則亡矣䕫即古䕫子國宋王梅溪舊治也四圍皆髙山峻嶺中橫江流一道對江之山左為赤腳右為白鹽巫山女子皆善吹簫嫁時衆女子治具送之吹簫數日為樂蜀中有此毋乃神女之遺風乎魚復即䕫地謂鰉魚至此復回不上也對城隔江有魚復縣故址白帝城離䕫東五里崇山巍然另作一城狀下既西陵峽口大江橫流漰騰澎湃真楚蜀咽喉也本朝設右所官兵守焉城上舊建公孫述廟後改漢先主廟以武侯關張配享綽楔題曰漢代明良廟後復有僧寺一區宋陸務觀記云有古松柏及孟蜀時碑與黃庭堅題石笋越公堂俱無一存自關而東即子美東屯故居矣瞿塘即峽內江水深沈處灔澦乃一石笋樹兩峽之中若青螺寶劍插於鏡中波面天下之險信無踰此俱在白帝城下灔澦大如象瞿塘不可上灔澦大如馬瞿峽不可下又云灔澦大如襆瞿塘不可觸舟人以為水候總之夏秋不可行也峽口鐵柱二不知是何代物上鑄守關大將軍徐宗武等字峽口石上字多磨滅惟一詩云白帝城邉春草生黃牛峽裏水波清追思昭烈千年事長使英雄氣不平後書大元至元十九年歲次壬午鎮國上將軍四川宣慰使何公同男到此吟而已諸葛八陳磧在䕫城者江沙上碎石行列如引繩春冬時見夏秋沒於水然江漲即浮磧上數十丈比退而陳石如故子美詩有江流石不轉之句䕫城無井官府軍民咸取汲於江雖治井亦不能貯水府治後僅有一泉自山頂流下四時不竭因而引入治內鑿池以貯之亦不能多分别𣲖䕫蓋蜀東門户然登後山城中一覽殆盡前即逼近江流城內薪水皆仰給城外不知前人何以為守䕫郡縣皆屬蜀而衛名瞿塘則屬楚國朝犬牙之制如此白帝城上僅元人一碑亦不甚佳餘皆今人詩字杜工部祠在郡東數里倚山俯江云亦新創祠中止塑像其秋興八詩近代雖有刻字殊不佳餘無足觀者豫置碑二一刻公像及史傳樹祠中一大書唐杜工部遊寓處樹道旁工部舊日草堂在城東十餘里外尚有遺址可尋止一碑存數字題重修東屯草堂記似亦元物城西開元寺唐了休禪師道場也國初張三丰與僧廣海善寓居于寺者七日臨别贈詩云深入浮屠斷世情奢摩他行恰相應天花隱隱呈微瑞風葉琅琅詠大乘密室晝閒雲作蓋空亭夜靜月為燈魂銷影散無何有到此誰能見老僧竝留草履一雙沉香三片而去後海以詩及二物獻之文皇答賜玉環一枚千佛袈裟一領今猶置寺中稱世寶云解學士縉有寺中法堂記碑先主永安宫遺址即今之學宫先主所崩處也諸葛武侯受遺命於此甘夫人墓在府治內後山前有二碑字似被近世更改吏卒皆能指㸃道之子美遊蜀凡八稔自大厯元年春至䕫大厯三年去而之楚寓䕫之東屯西瀼者凡三年得詩四百餘首瀼者土人謂山間通江之流曰瀼䕫譙樓上柱聨即當用杜詩五更鼓角聲悲壯三峽星河影動搖何等壯麗俗人因諱悲字置之志稱有詩史堂刻杜工部遺像又有萬丈堂取光焰萬丈之義俱在府治內今不可考郡齊望隔江羣山咫尺七峯分列若屛朝暮之間翠色撲人衣袂豫因取杜句翠屛名署中小齊䕫之香櫞大而香為閩浙所無亦有獅頭柑佛手柑皆可玩雲陽縣即古雲安也酒未見佳才傾一盞即薰人之句每過高誦數回雲陽對江山上有張桓侯廟香火頗盛傳云侯之首葬此官舟過縣必設牲醴望祀之萬縣本漢朐䏰縣地隔江有岑公洞寬敞如庭室中有石狀如芝儼人為者壁上多前代題識洞前石碑林立惟黃山谷楷書一通學顔體甚佳岑公唐人也為仙化去出城渡河有巨石亘生水面呼曰天生橋又曰天仙橋石橫百丈寬數十丈平坦如削下有飛瀑崩騰如萬馬之聲過之毛豎豫語越尹當建二坊標其勝尚未就丙穴在逹州出嘉魚杜工部詩云魚知丙穴由來美是也志又載雅州亦有丙穴梁山亦漢朐䏰縣地東九十里有泉自山頂下注東坡昔以飛練名其亭嘉靖間守臣獻白兔至此而斃瘞之因更建亭子故今稱之曰白兔亭行山路既疲又復飛泉百丈十里聲不絶誠長途一快事勝覽也又聞山上有洞惜未及登黃葛樹葉似桂稍大團欒䕃數畝冬春不凋幹則擁腫根皆蟠露土上至於石崖之側則全欲不藉土生者䕫之梁木最多惜無材用竹䶉太平東鄉皆有之生于竹中之鼠也形色俱類鼠差大而肥烹之味與黃鼠無異郭公棐嘗梓䕫門三傳名宦則諸葛亮李靖源乾曜韋處厚唐介虞允文王十朋李浩查籥劉光祖余應求孟珙鄉賢則屈原李逺廖彥正楊晨袁沔青文勝汪瀚栁英流寓則宋玉杜甫李白冦凖張俞邵雍黃魯直宋濂惟武侯工部王梅溪有特祠祀之益部談資卷下
