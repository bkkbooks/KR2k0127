body:
  text: 益部談資卷上明何宇度撰王逸少生平最慕蜀之山川渇欲一逰與周益州書云省足下别䟽具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉但言此心已馳於彼矣又云吾有七兒惟一小者未婚過此便得至彼得果此縁一段竒事又云鹽井火井皆有不峨眉山夏含霜雹碑板之所聞崑崙之伯仲也其言不一而足雖雅志未酬千載之下猶與此中山水争勝逸少帖逰目汶領即岷嶺用古字也與謝東山書嘉州舊有石刻今不復存宋陸務觀范石湖皆作記妙手一有入蜀記一有吳船録載三峽風物不異丹青圖畫讀之躍然益州耆舊傳晉陳夀作益州記漢李膺作華陽國志晉常璩作成都記唐盧求作蜀檮杌宋張唐英作成都古今集記宋趙抃作續記宋王剛中作蜀鑑宋李文子作丙丁二記宋范石湖胡長文作䕫記本朝郭棐作諸書僅華陽國志蜀鑑蜀檮杌䕫記有刻餘俱湮没久矣玉壘青城俱在灌縣雪山在茂州峩嵋在嘉定李白讀書匡山在彰明劔閣在閬中崌崍在眉州瓦屋在榮經俱海内名山鼎峙珠聨盈於境内全蜀藝文志楊用修所編也網羅金石鼎彞秦漢之文幾盡可謂博矣然惜太繁刻在藩司已不存太平清話云四川總志惟藝文一卷乃用修所選立例最古似殊不然豈俱未見二書乎蜀之山大約近江源者皆謂之岷山峰連岡屬千里不絶今俗謂青城為岷山者以此又聞凡稱岷嶓者該衆山言也凡稱沱潜者該衆水言也盖蜀山之居左者皆曰岷居右者皆曰嶓水出於岷者皆謂之江出於嶓者皆謂之漢或謂之漾或謂之沔出於江而别流别而復合皆謂之沱出於漢而别流别而復合皆謂之潜古今論岷嶓沱潜者衆矣參差不一莫得其真惟由不知左者皆得為岷右者皆得為嶓而獨指成州之汶山為岷山金牛之嶓冢為嶓山隘矣然今嶓冢又改𨽻陜西非蜀可得並論也蜀之水宋王象之言之頗悉四瀆惟江最大發於岷逕䕫荆而入於海自蜀而言江之外其水有七出於綿州者綿水出於什邡者涪水分流於永康者渝水三水皆合於雒自雒逕懐安簡資富順至瀘與江水㑹總曰内水發源於江汭逕綿潼東至於合曰涪水發源於沔逕大安利閬合於涪水曰嘉陵水發源於小巴嶺逕巴蓬至於渠曰巴水出萬頃池逕與巴水合曰渠水巴渠二水合而與嘉陵涪水㑹以達於渝而江始大若分流出夷中入中國以附於江者有三曰青衣曰羊山曰馬湖青衣逕洪雅夾江而下羊山逕漢源至嘉定馬湖自夷都流至叙俱與江合而下䕫峽惟漢水出嶓冢與江分流由漢金趨襄至江夏大别山始與江合而達於海蜀之文人才士每出皆表儀一代領袖百家漢如揚雄王褒司馬相如唐如陳子昻李白宋如蘇家父子元如虞集豈他方所能比擬然不特此香奩之彦若花蘂當壚製箋才情豈在人下火井卭州蓬溪富順咸有之蜀都賦火井沈熒於幽泉髙焰飛煽於天陲註曰欲出其火先以家火投之湏臾焰出以竹筒盛之其火無灰井有水火取井火煑水一斛得鹽五斗家火燃之則鹽減卭州南設有火井廵檢司蓬溪者地窪若池以火引之有聲隱隱出地中少頃炎熾夏月積雨停水則焰生水上水為之沸而寒如故秋冬水涸則土上有焰觀者至焚衣裾油井在嘉州眉州青神井研洪雅犍為諸縣居人皆用以燃燈官長夜行則以竹筒貯而燃之一筒可行數里價減常油之半光眀無異茶為蜀中郡邑常産䝉嶺在名山霧中在大義俱擅古今名品世又謂峨嵋之味初苦而終甘茶經又云瀘茶味佳飲之療風若余所見成都之灌縣䕫門之開縣初春所採不減江南鹽井各州邑多有之大小不一深可數十丈上孔僅盃盂大用竹作長筒垂下取水而煎曬即成鹽業此有成富者亦有家為之累者隨其所遇然開井祗慿堪輿家言不知何術得此大禹史稱生於西羌方輿志謂今石泉縣之石紐村是其發祥地也山石紐結題有禹穴二字傳為李太白所書塗山氏之塗山今在重慶城外即其后家耳後因巡狩而南崩於㑹稽亦有禹穴者乃其𦵏處𤣥帝幻身在今中江之雲臺山峯岫逶迤殿宇𢎞麗乞靈者踵接另有志可考文昌帝君傳云降生於越之西巂之南兩郡之間今之梓潼縣是也志稱祠中刻有帝親筆書自作紫府飛霞洞記落筆精妙命詞簡逺惜未得覩許真君名遜洪州人也嘗為徳陽縣令有仙術歳歉㸃石化金以濟民今縣治有煉丹井煉丹臺遺跡存焉即豫章鐵柱宫所祀者大峨山者普賢大士道塲西竺僧所稱髙出五岳秀甲九州震旦第一山也有蘇稽渡故子瞻讀書處及魏鶴山陳圖南諸墨蹟石下泉水云與楚玉泉寺通郭景純賦峨嵋為泉陽之掲殆是乎歌鳯臺為昔楚狂棲隱處中峰寺有孫思邈藥鼎小鳥如鸜鵒鳴曰佛現向人掌取食蒼䑕成羣了不避人石徑寸者常放光日射如虹入蜀不逰此何以稱竒宋祁有益部方物贊曰海㯶曰楠曰榿曰竹栢曰海芋曰紅豆曰紫竹曰慈竹曰㯶竹曰方竹曰柑曰赤鸇芋曰緑蒲萄曰天師栗曰天仙果曰隈支曰錦被堆曰錦帶花曰石蟬花曰長生草曰瑞草曰紅蕉花曰重葉海棠曰月季花曰佛豆曰添色拒霜花曰黄荼䕷曰艾子曰鴛鴦草曰娛美人草曰仙人縚曰羞寒花曰瑞聖花曰七寶花曰旗節花曰娑羅花曰木蓮花曰鵞毛玉鳳花曰蒟曰真珠菜曰朝日蓮曰蟬花曰燖麻曰水硫黄曰附子曰石瓜曰芎曰大黄曰餘甘子曰金星草曰桐花鳯曰紅桐觜曰荏雀曰䕶花鳥曰百舌鳥曰狨曰尨羊曰玃曰魶魚曰嘉魚曰鮇魚曰黑頭魚曰沙緑魚曰石鱉魚曰金蟲凡六十五種武擔山在藩司右西蜀記蜀王開明妃死遣五丁擔土為塜而成以是得名史稱昭烈即位於武擔山之南即此楊妃池在灌縣東太真外傳云妃父𤣥琰為蜀州司户妃生於蜀嘗誤墜池中故後世池以妃名文君井在卭州采蘭雜志載文君閨中一井文君手汲則甘香沐浴則滑澤鮮好他人汲之與常井等今白鶴驛中之井是也水尚清澈州人釀酒必取之眉州象耳山舊有李白題石云夜來月下卧醒花影零落滿人衣袖疑如濯魄氷壺也真千古佳語播州今改遵義府即漢之牂牁唐之夜郎也李白貶於此志載流寓以白稱首簡州逍遥洞有漢碑止十二字云漢安元年四月十八日㑹仙友旁書東漢仙集留題乃古𨽻資縣有唐顔魯公書中興頌刻於廢寺磨崖上石理甚粗字半漫滅去碑五里河名唐明渡云明皇駐蹕之所資縣球溪有僧化去今九年矣幻體如生或稱曰活佛或曰乾和尚葉令為繪圗作詩表之眉州有蘇長公水坻小像李龍眠畫子由贊雖國初重刻不失古意又有長公馬劵刻黄魯直䟦及醉翁亭記水調歌頭諸碑皆近代效滁黄鐫者潼川即古梓州城外牛頭寺在焉形如伏牛竹樹迢逓不負昔賢稱賞問牛頭之稱山僧指以路旁小石而州之俗人又刻龍於石俱可笑也山上俯視城郭江流如畫第青山意不盡之句無一碑刻不免是此邦缺事漢州古廣漢也新都即楊用修故里宅第不甚宏麗問之遺書僅存一二杜宇亦曰杜鵑蜀人稱為望帝魂所化其説前人言之詳矣志稱成都有望帝廟荔枝叙馬瀘涪合俱出嘉定富順亦有之叙瀘為上涪合為次嘉州今止一二株屬之蜀藩華陽國志載漢宣帝時荔枝開日二千石張具其下邀賔賞之一騎紅塵妃子笑盖從棧道入闗耳涪舊有妃子園顆最肥大馬馳七日夜即抵長安其速如此所謂無人知是荔枝來也重慶營昌諸處又聞亦有龍眼白居易為木蓮荔枝圗各紀其狀曰荔枝生巴峽間樹形團團如帷盖葉如桂冬青華如橘春榮實如丹夏熟朶如蒲桃核如枇杷殻如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴如酪若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣卭竹出卭州之卭崍山即古臨卭地也漢張騫奉使西域得髙節竹還而植此今人取以為杖鶴膝者佳又叙州亦出此竹雅州復有一種名羅漢竹皆為杖之具海棠有色而無香惟嘉州色香並勝大足治中舊有香霏閣號曰海棠香國謂杜子美諱母乳名詩中不之及恐亦宋人傅㑹諸葛菜即古之蔓菁今之紅蘿蔔也武侯謂視諸蔬有六利四時各食其根莖心葉令軍中所至咸種蜀故以是名之蒟醬見於相如揚雄左思諸賦中註云縁樹而生其子如桑椹盖僰道通越巂之地出蒟僰人取以為醬僰地即今叙州也問之莫答或云今之雞鬃油及滇中窶葉皆相彷彿晉灼註蒟音矩徐廣註蒟亦作枸音窶蜀檮杌載孟㫤十月宴芳林園賞紅梔花乃青城山進三粒子種之而成者其花六出而紅清香如梅今不可得見傳稱雷威作琴不必皆桐遇大風雪之日酣飲着蓑笠獨徃峨嵋山深松中聽其聲連延悠揚者伐之斵以為琴有最愛重者以松雪名之故世稱雷威琴東川有夷一種名曰僰人烏䝉即古賨地漢為牂牁郡鎮雄即古芒部地天全即古氐羌地黎州即古西南夷筰都地漢為沈黎郡尨安即古冉駹地松潘亦古氐羌地漢設䕶羌校尉居此雪嶺在其境内建昌即古越巂郡又謂之㺐郡其夷又謂之羅羅西畨與蜀相近貢道必由錦城有三歲一至者有一歲一至者其貢則小鍍金銅佛銅小寳塔彩色小盡佛銅鐵刀劍盔甲及珊瑚唵叭香舍利子氆氌諸貨也舍利子止小菉豆大紅紫色用香綿包裹問其俗云伊國人初生時即能言前生功果者國王拜為國師僧人老死能前知死期而以所餘付後人者國人即謂真佛遂合衆同焚從灰燼中得舍利今來獻貢之僧皆係中年紅補衣僧帽束五彩軟帶乃伊國之尊官法師中朝之賜衣也言語不通中華食牛羊肉而飲酒畨物名不一志載惟足力麻鐵力麻氆氌三種而自蜀人言者有曰細毯工布㲲毯絨邉工毯姜納大貨貼裡綿惟慿粗細顔色定價值川扇不知起自何時然李徳裕有畫桐華鳯扇賦云未若繪兹禽於素扇動涼風於羅薦則唐時此地已嘗製之矣竹本蜀所富有第不甚堅厚紙則出嘉州彭縣輕細柔薄惟可製扇是其來已非一日欲不充貢得乎諸葛皷乃銅鑄者其形員上寛而中束下則敞口大約若今渣斗之倒置也面有四水獸四周有細花紋其色不甚碧緑撃之彭彭有聲如鼔云置於水撃之其聲更鉅長腰鼓即古之蜡鼓也長七八尺以木為桶腰用篾束二三道塗以土泥兩頭用皮幪之三四人横擡扛撃州郡獻春及田間秧種時農夫皆撃此復雜以巴渝之曲熊之為物多係獸形諸深山中人跡罕到處皆有之力能食虎其皮色黑而大勝於虎掌味固佳然聞身之味亦不減道書載中國名山青城峨嵋為西嶽佐理又三佐命山及十大洞天皆有青城而福地七十二則巫山臨卭平都在其列青城山唐杜光庭記岷山連峯接岫千里不絶青城乃第一峯也山有七十二小洞八大洞道書以為第五洞天神仙都㑹之處八陣圖有三處一在新都牟彌鎮一百二十有八當頭陣法也一在䕫州六十有四方陣法也一在棊盤市二百五十有六下營法也劔閣兩崖峻㧞鑿石架閣而為棧道秦司馬錯由此伐蜀籌筆驛在廣元武侯出師嘗駐於此唐李義山詩云魚鳥猶疑畏簡書風雲常為䕶儲胥徒令上將揮神筆終見降王走傳車此其地也石繖在廣安石船在大竹俱江中皆以形名聖燈蓬山者為最初出三四㸃漸至數十㸃髙下相應離合不常未知何物虎豹此邦常産其文艾葉金錢為佳然聞有銀邉金錢者羊名蟠者其角年乆而蟠皮可坐數人羚羊皮毛色青兵中卧之有警則自動天狗皮毛純白嚴寒坐卧之處雪為不積皆出諸夷山中火浣布不朽木俱出於建昌夷中其布即取此木之絲而成焚之燃而無灰焰過仍還故物兎之白者自是一種安縣間有攜至㑹城者予因憶向年家食曽於沔州費兵憲處見有三小白鹿云自闗中攜歸身白而目紅儼如圗畫中所繪豈凡物皆有白色特未之多見乎鯢魚一名魶一名䱱出榮經河中大首長尾而有四足能援樹攀木聲作兒啼土人多食之雪蛆産於岷峨深澗中積雪春夏不消而成者其形如蝟但無刺肥白長五六寸腹中惟水身能伸縮取而食之湏在旦夕否則化矣香猪土犬建昌松潘俱出香猪小而肥肉頗香入冬醃以餽人土犬亦小而肥美羣逰稻田一犬登樹而望如有捕者則先鳴吠令衆犬奔逸黄庭堅嘗謫涪州守因自號曰涪翁李白嘗避難過涪州故今鎮名曰李渡中巖諾矩羅尊者道塲離青神南五里寺臨江干有水月閣下更逼江水喚魚池在巖石下小魚百千頭僧拍手始集三石笋從地而起石逕髙峻宛曲泉從兩山而下頗盡林壑之美凌雲山與嘉州對岸石壁鐫千佛内彌勒像首攅峯頂趾囓江水髙三百六十尺唐韋臯所造其上殿閣磴道依山盤曲前望峨嵋三峯下俯眉雅諸水真江山輻輳處也其左有蘇長公墨池著書堂長公云天下山水在蜀蜀之山水在嘉嘉之山水在凌雲蜀中水陸舟車所經凡有巖石莫不鐫佛像豈地近西畨前代風氣漸染如此保寕郡治前對翠屛山江流環遶其下闤闠殷富川北奥區也張桓侯墓即在治旁廟宇巍峩郡人咸嚴事之出郭而西經槐樹施店栢林圎山龍潭五驛始抵廣元重岡複嶺道路綿邈行者苦之闗曰二郎曰栢曰梅皆極險峻擅登青天之譽廣元即利州古之葭萌也出郭數里石壁臨江鐫大小佛像幾滿非近代物車馬遶㟁而行下視深潭毛為之𥪡宛然又一巫峽也廣元而西經沙河神宣黄壩三驛始出蜀境巖嶺千削四無人烟行者如臨絶境視之歸巫道路僅讓一籌七盤嶺乃秦蜀分界處一峯挿天萬石羅列中開一綫之道而下俯絶澗誦岑嘉州杜工部之句不覺七盤日月飛動蜀中諸郡天氣不一重䕫四面皆山城基少土冬雖不寒夏則最熱六七月間裸體終日瞶瞶如醉夢中夜寢汗透枕簟惟錦城隆冬時或揮扇夏夜間覆單衾乃四時隂多晴少數郡皆同每誦子美蜀星隂見少江雨夜聞多感歎此老信是詩史松潘去省不旬日聞彼中最寒卧室之内冬必纍火重裘盛夏一雨即擁絮炙炭盖近西北地氣使然蜀江界兩山間即風亦無波舟且不篷奈何禍常不測予目撃之始得其故盖灘急水駛怪石林立舟薄而載重長年每倩客為之突然遇石鮮不齏粉是以絶無顛覆惟有沉溺患生於頃刻無事時非如大江風波可以閃避也誠能及是安得有虞出師表五月渡瀘瀘以水色黑得名今之金沙江是也滇蜀之交一在武定之南一在姚安之左益部談資卷上
