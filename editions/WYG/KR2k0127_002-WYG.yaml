body:
  text: 益部談資卷中明何宇度撰成都一名錦城一名錦官城秦張儀所築有大城小城子城三區後始改合附郭縣二曰成都曰華陽華陽古國名也成都城外皆平壤竹樹蓊蔚田地膏腴江河諸流交錯貫絡昔稱天府沃野信非虚語江從灌口來夏秋水漲濶盈里許冬春水涸如帶邦人或以河名之錦城又名芙蓉城昔蜀孟昶僣擬宫苑城上盡種芙蓉謂左右曰真錦城也後世因之亦種芙蓉於上有直指登城不便輿從命稍芟之軍卒因盡芟去東南角樓榜曰芙蓉樓名雖佳規製不甚鉅麗宴㑹亦不恒到西南角樓榜曰錦江春色俯視江河諸流青羊浣溪諸處景物差勝環城為橋者四曰駟馬即相如題柱處舊昇仙也南曰萬里取孔明送費禕聘吳曰萬里之行始於此之義東曰濯錦西曰浣花名皆古雅可誦唐史載𤣥宗狩蜀至萬里橋問橋名左右對以萬里𤣥宗歎曰開元末僧一行謂更二十年國有難朕當逺逰至萬里之外此是也遂駐蹕成都文翁禮殿今學宫即其故址云漢文翁立學作石室繪三皇五帝仲尼七十二賢及兩漢君臣像於其中祀之至唐已漫滅宋嘉祐中重為摹冩增至一百七十三人今學宫止有孔門諸弟子石刻不知仍是故物否其餘不可見矣因録其姓名盤古伏羲神農倉頡沮誦黄帝少昊髙陽祝融髙辛堯舜禹咎繇稷契伯夷䕫湯伊尹髙宗傅説太王王季太伯文王太顛閎天散宜生南宫括武王太公周公成王召公仲山甫宣王管仲子産李冰老子蕭何張良叔孫通陸賈漢文帝賈誼文翁漢武帝董仲舒公孫𢎞倪寛司馬相如王吉蕭奮戴聖匡衡王尊李疆莊君平劉向揚雄漢光武鄧禹張堪張湛桓榮劉平鍾興第五倫㢘范班固黄昌种暠馬融李膺髙眹陳寔服䖍陳紀鄭𤣥諸葛亮龎統董和費詩譙周鍾繇王肅羊祜張華杜預王濬夏侯湛喬智明范廣謝安桓石䖍蜀錦之名其來乆矣城名錦官江名濯錦而蜀都賦云貝錦斐成濯色江波逰蜀記云成都有九壁村出美錦歲充貢宋朝歲輸上供轉運給其費府掌其事元豐中建錦院歲募軍匠五百人其錦之名凡三十餘種今惟蜀藩製之名無多而價甚昻不可易得蜀箋古已有名至唐而後盛至薛濤而後精據譜云箋之名不一有曰玉版曰麥光曰貢餘曰經屑或布紋或繞綺紋或人物花木蟲魚鼎彛紋唐韓浦詩云十様蠻箋出益州寄來新自浣溪頭則又倍多矣濤製更有小而僅可書一詩者乃今蜀藩所造僅純白一種清瑩光細長餘五六尺寛僅二三尺亦無諸花紋逺讓古昔多矣十箋者曰深紅曰粉紅曰杏紅曰明黄曰深青曰淺青曰深緑曰淺緑曰銅緑曰淺雲又有松花金流沙彩霞金粉桃花冷金之别皆其異名史載王衍以霞光箋五百幅賜金堂令張蠙霞光即深紅箋也又有百韻牋以其幅長可冩百韻詩其次學士箋比百韻較短何今日輙無一種漢昭烈帝恵陵去城南五里古塜巍然石碑僅未斷傍即昭烈廟頗壯麗用武侯諸將配享前有穹碑以亭覆之乃唐之裴度記栁公綽書也㑹城古碑僅有此予謂衢口當樹一坊名曰漢昭烈陵廟嘗質之當道未果揚雄舊宅在府治西成都縣治其舊址也今藩司前有墨池草𤣥亭在焉誦岑參詩吾悲子雲居寂寞人已去娟娟西江月猶照草𤣥處為之悵然米芾有墨池碑字子雲家貧嗜酒問字者多載酒而徃清賞録載者有犍為人得雄草𤣥之硯如今製但去圭角王褒宅在資陽墓在資縣舊碑剥落不堪讀李白宅在彰明聞有碑刻在焉花蘂夫人宅在灌縣夫人姓費氏青城人以賦宫詞百首著名全蜀藝文志仍載有遺詩百首是楊用修収者嚴君平墓在新都有碑樹於道傍賣卜之肆在省城漢明帝諱莊故史記改莊為嚴以莊與嚴古同義武侯祠在城西浣花溪上與子美草堂相接廟貌雖未頺壊森森之柏亦不復存相如宅在城西南五里又云在市橋西今琴臺去城西五里豈非其處乎秀栢參差當壚滌器風流宛可想見傳謂相如死文君為作誄是文君豈徒以色稱者支機石在城西隅即嚴真觀今以一亭覆之髙不盈丈頑石無他竒晉張華博物志有人居海上乗槎到天河得一石歸以問嚴君平今蜀人相傳即此子美石笋行云在成都西門陌上按志有二株雙蹲一南一北南者髙於北以公孫時嘗折也今遍問故老於西門外竟無有也豈後又盡被折去耶城南市名五塊石有大石五片疊壘其上云石下有海眼豈即石笋年乆傾斷置此乎又云五丁所置下有海眼青羊宫在城西南竹樹青葱殿宇𢎞麗㑹宴多徃焉昔老聃謂闗令尹喜曰候於青羊肆相尋即此地杜少陵勝國時加諡文貞祠在浣花溪上云即草堂舊址人多以草堂呼之祠後堂匾陳方伯鎏即書萬里橋西一草堂棟宇尚未傾圮盖監司郡邑常宴㑹處予稍為之修葺鐫公遺像及唐本傳於石榜署皆用公詩而櫽括之曰背郭堂成錦里溪山千古在縁江路熟青郊竹樹四時新又萬丈光芒信有文章驚海内千年艶慕猶勞車馬駐江干又萬里橋西草堂佳句如新宛見卜居之興百花潭上水檻蒼波依舊長留懐古之思不知堪博此公捧腹否浣花溪中一洲横出下即百花潭也舊有洲上亭一跨水橋亭一名皆無謂予易以浮槎滄浪二榜及增益竹樹於上子美有靈當亦稱快武侯工部二祠之中有寺一名草堂一名中寺前代為尼居名桃花寺隋文帝時始易以僧大歴中崔寕鎮蜀以冀國夫人任氏本浣花女遂重修之繪任氏真於其中㑹昌中欲毁寺夜聞女子啼泣之聲中止已而禱雨有驗本朝賜名梵安寺百花潭口舊有任氏一碑立於風雨中予令人滌去苔蘚讀之乃宋熙寧年間吴中復撰八分書也字半漫滅略可成誦云夫人微時見一僧墜汚渠為濯其衣百花湧出因而名其潭後杜少陵薛濤皆買居潭側薛濤唐之青樓人也其詩云聞道邉城苦於今到始知好將塞下曲唱與隴頭兒濤本長安良家女父卒於蜀失身為妓晩歲住居碧雞坊王建贈詩云萬里橋邉女校書枇杷花裏閉門居掃眉才子知多少管領春風總不如墓在江干碑題唐女校書薛𢎞度墓𢎞度盖濤小字云卒時年七十三段文昌為譔志銘一時名士如韋臯李徳裕元稹白居易裴度杜牧劉禹錫張祜咸與之唱和薛濤井舊名玉女津在錦江南岸水極清澈石欄周環乆属蜀藩為製箋處有堂室數楹令卒守之每年定期命匠製紙用以為入京表疏市無貿者石犀寺俗稱曰石牛寺華陽國志云太和年前建今佛殿之前有一大石其形如犀殿中又有水眼如井云其水與海通有太和年間馬季武冩經石幢射洪祠在北門外驛傍傳云蜀獻王初之國夢有神冠冕來謁者王問為誰對曰陳子昂也今為射洪土神王駕過䕶送至此王因其地立祠祀之世因謂子昂為蜀土神大慈寺唐至徳年建舊有𤣥宗書大聖慈寺四字寶光寺即故興福寺亦創自唐時惜皆無舊碑可考東坡云古今畫水多作平逺細皺其善者不過能為波頭起伏唐處士孫位始出新意盡水之變號稱神逸其後蜀人黄筌孫知微皆得其筆法嘗於大慈寺四壁作輸㵼跳􅕚之勢洶洶若崩崖也知微死畫法中絶今大慈寺故在也四壁安能復覩桐花鳯志稱成都春日桐花開時有鳥小而具五色如鳯形盤旋樹上桐花謝莫知所之問之郡人亦不多見鸚鵡成都甚多梁山諸縣亦有之春時飛鳴如陣每過浣溪樹下停車側耳者乆之楊梅蜀藩夏日相餽亦鹽水浸者顆味俱讓吳下􅙐醿花志載惟成都最佳予見三種曰白玉碗曰出爐銀曰雲南紅色香俱美可敵南中黄薔薇牡丹諸色俱偹千葉而大如毬兩都所不及也一名魚血紅者獨艶惟無黄者山茶有雲南紅石榴紅謝萬定數種朶大勝芍藥重瓣如芙蓉土人自能接他處所莫匹也寶珠雖有又拜下風矣素馨紅者白者俱竒品紅開於春白開於秋桂之丹者色亦角於南中茉莉枝如藤花瓣稍大山蘭四季有花香氣襲人又有一種葉稍大紅黄白五色而窮冬新正盛開名曰蟬花則尤異也賽蘭香葉如豌豆開花似粟香亦清逺此中人甚愛重然云蘭為所賽似未必然楊用修伊蘭賦謂不足於艶而有餘於香戴之髤紒經旬猶馨古人用紉佩頮浴西畨有伊蒲佛供即是此花郫筒酒乃郫人刳大竹為筒貯春釀於中相傳山濤治郫用筠管釀􅙐醿作酒經旬方開香聞百步今其製不傳榿木籠竹惟成都最多江干村畔蓊蔚可愛每見必誦杜甫礙日吟風之句第榿字音欺不見字書金馬碧鷄祠在北門内金馬坊側漢宣帝聞益州有金馬碧鷄之神遣諫議大夫王褒醮祭於此宋賜廟額曰昭應今仍賜金馬云蠶叢寺在府治西南蠶叢初為蜀侯後稱王教民桑蠶蜀人至今徳之八蜡寺在城東南隅有司春秋致祭八蜡神者先嗇先農司嗇郵表畷猫虎坊水庸也宋景濓國初仕學士致政歸青羅山因其孫以罪被刑安置公茂州子瓉隨侍之蜀間關萬里卒於䕫門瓚與家人皆相繼而没蜀獻王憐之移𦵏於成都之東郊即今之浄居寺也祠廟宏整有司嵗舉祀焉其遺裔尚有存者方孝孺嘗應蜀藩聘至因兼立祠於左仙宫佛院成都頗盛半創自獻王之國時累代藩封中貴從而增益之殿宇廊廡華麗高敞觀如𤣥天雲臺寺如昭覺金像浄居浄因俗名萬福金沙廟如昭烈宫如青羊俱不減兩都規模足供逰眺諸寺間藏有佛牙甚至重七斤餘者錦袱宋匣珍襲嚴祀余頗疑之偶撿本草豹之齒骨極堅人得之詐為佛牙以誑俗為之爽然自失此可以一洗蜀僧之陋楊用修著述之富古今罕儔予所見已刻者二十九種升菴全集升菴詩集升菴詩話楊子巵言赤牘清裁詞林萬選丹鉛要録丹鉛總録丹鉛摘録丹鉛餘録丹鉛續録秇林伐山墨池𤨏録詩話補遺五言律祖絶句辯體禪林鈎𤣥水經古今韻語轉注古音略古音駢字古複字古音附錄異魚圗贊韻林原訓李詩選杜詩選風雅遺編皇明詩抄未見已刻者三十九種南中續集玉堂集長短句長短句續集書品詞品金石古文畫䟦赤牘拾遺選詩外編選詩拾遺唐絶精選唐音百絶唐絶增竒六言詩選古文音釋古音獵要古音叢目竒字韻古文參同契温泉詩集洞天𤣥紀檀弓叢訓禪藻集譚苑醍醐陶情樂府樂府續集箜篌新詠墐户録滇載記脉位圖説連夜吟卷月節詞千里面談經義模範崔氏志銘山海經補註七十行戍藁聞未刻者尚有七十一種各史要語晉史精語夏小正觧管子叙録莊子刋誤古雋謝華啓秀羣書麗句文海釣鰲名奏菁英四詩表証註古文韻語别録古文詩選皇明詩續抄詩林振秀五言絶選選唐百絶寰中秀句古今栁詩古諺古今風謡蒼珥記逰填詞選格百琲明珠詞苑增竒草堂詩餘補遺六書傳證六書探賾篆韻索隠古篆要畧六書統摘要𨽻駢銘心神品韻藻晞籛􅤕聿清暑録希姓録滇程紀書畫名䟦書畫神品目素問糾略羣艶傳神江花品藻滇候記引書晶鈍丹鉛别録丹鉛閏録丹鉛贅録升菴經説文逰餘録巵言閏録敝帚病榻手吹蘇黄詩髓宛陵六一詩選五言三韻詩選五言别選宋詩選元詩選羣公四六節文古韻詩略説文先訓古今詞英填詞玉屑六書練證逸古編經書指要偶語六書索隠總之一百四十種用修之夫人能詩其一律一詞已載之王元美藝苑巵言矣今從伊里人更得數首曰珠淚紛紛滴硯池斷腸忍冩斷腸詩自從那日同擕手直到而今懶畫眉無藥可療長夜恨有錢難買少年時殷勤嘱付春山鳥早向江南勸客歸又懶把音書寄日邊别離經嵗又經年郎君自是歸無意何處春山不杜鵑又丈夫本是四方客妾為離愁心似結公義私情不兩全願君早向凌烟勒又聞道滇南花草鮮輸君日日醉花前銀河若得鳷毛渡並駕仙舟聴採蓮又纔經賞月時又是菊花期歲月看流水人生逺别離武侯祠壁間嵌一小碑上鐫繪像衣冠甚古雅題云丁黼字文伯石埭入也宋嘉定初進士有詩名以忤史彌逺出帥成都賦錢尉入國詩曰正是朔風吹雪初行縢結束問征途不能刺刺對婢子已是昂昂真丈夫常恵舊曾隨屬國烏孫今亦病匈奴不知漢節歸何日准擬殷懃説汴都元人入蜀公不屈死之事聞詔諡恭愍賜廟涎溪有司春秋致祭字畫遒逸可愛立此石者吳本義不知何許人長樂花枝葉皆如虎耳草秋後叢生盆盎間開紫色小花冬末轉盛鮮麗可愛居人獻歲以此為餽名曰時花任氏墓碑予嘗捜之荆棘中近見稗史載任氏者唐之尚書侯繼圖妻也侯讀書大慈寺因秋風起拾得一桐葉有詩在上貯之匣中後數年方卜任氏為妻任見而驚曰此妾書葉詩胡為在君乎詩曰拭翠斂蛾眉鬰鬰心中事搦管下庭除書成相思字此字不書石此字不書紙書在桐葉上願逐秋風起天下有心人盡觧相思死天下負心人不識相思字有心與負心不知落何地益部談資卷中
