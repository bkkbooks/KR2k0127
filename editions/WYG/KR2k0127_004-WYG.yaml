body:
  text: 跋何仁仲辭賦之業士林聲稱籍甚而不悉其有政事材浮沉兩都散署十許年僅得判䕫府當事者一切盤錯輙屬仁仲應時批解飭簠簋而逺苞苴人皆嚴重之居䕫僅數月督府置諸幕不使佐成都守攝華陽令其最不易辦者為貢箑仁仲費省而事集兩臺及監司予上考而銓曹漫然用左官律監之余使訊仁仲仁仲遺一編書曰益部談資君望我意氣乎槖中装盡是矣余發視之則皆蜀故實山川人物之勝瞭然指掌應接不暇而時吐致語靡靡可聴余調仁仲不聞沈休文之戲朱彦和耶年少何乃不廉天下唯文義棊書一時将去仁仲以詞客兼吏事名是為妬媒宦蜀三年遂括蜀千古之美英英斑管纍纍錦囊又何得不左官人傳仁仲入都面詰銓曹左官坐何状曰不當以辭翰内交仁仲言能為辭翰者内交我耳非我交人曰貲郎何必辭翰仁仲失笑此自蜀人司馬長卿作俑夫以辭翰内交孰與以賄信如所云長安輦上貴人必不識一丁者耶長揖而出此語殊可為談資附之以資談者南新市人李維禎本寧甫譔
